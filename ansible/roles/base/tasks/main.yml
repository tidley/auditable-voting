---
# =============================================================================
# Base role: Install Docker, create shared network and directories
# Compatible with: Ubuntu 20.04+, Debian 11+
# =============================================================================

- name: Verify supported OS and version
  ansible.builtin.assert:
    that:
      - ansible_distribution in ['Ubuntu', 'Debian']
      - (ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('20.04', '>=')) or
        (ansible_distribution == 'Debian' and ansible_distribution_major_version is version('11', '>='))
    fail_msg: >
      Unsupported OS: {{ ansible_distribution }} {{ ansible_distribution_version }}.
      This playbook requires Ubuntu 20.04+ or Debian 11+.

- name: Set OS-specific variables
  ansible.builtin.set_fact:
    docker_repo_distro: "{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}"
    docker_gpg_url: "https://download.docker.com/linux/{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}/gpg"
    docker_repo_url: "https://download.docker.com/linux/{{ 'ubuntu' if ansible_distribution == 'Ubuntu' else 'debian' }}"

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - python3-pip
    state: present

# --- Docker Installation ---

- name: Create apt keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Download Docker GPG key
  ansible.builtin.get_url:
    url: "{{ docker_gpg_url }}"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }}
      signed-by=/etc/apt/keyrings/docker.asc]
      {{ docker_repo_url }} {{ ansible_distribution_release }} stable
    filename: docker
    state: present

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker is running and enabled
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# --- Python Docker SDK (needed for Ansible docker modules) ---

- name: Install Docker SDK for Python via pip
  ansible.builtin.pip:
    name:
      - docker
    state: present
    break_system_packages: true

# --- Docker Network ---

- name: Create shared Docker network
  community.docker.docker_network:
    name: "{{ docker_network_name }}"
    state: present

# --- Directories ---

- name: Create base directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/tollgate
    - "{{ traefik_data_dir }}"
    - "{{ traefik_data_dir }}/acme"
    - "{{ mint_data_base_dir }}"

# --- Firewall ---
# Use UFW on Ubuntu (usually pre-installed), iptables on Debian

- name: Check if UFW is available
  ansible.builtin.command: which ufw
  register: ufw_check
  changed_when: false
  failed_when: false

- name: Configure firewall with UFW (Ubuntu)
  when: ufw_check.rc == 0
  block:
    - name: Install UFW if not present
      ansible.builtin.apt:
        name: ufw
        state: present

    - name: UFW - Allow SSH
      community.general.ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: UFW - Allow HTTP
      community.general.ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: UFW - Allow HTTPS
      community.general.ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: UFW - Enable with deny default
      community.general.ufw:
        state: enabled
        default: deny
        direction: incoming

- name: Configure firewall with iptables (Debian fallback)
  when: ufw_check.rc != 0
  block:
    - name: Install iptables-persistent
      ansible.builtin.apt:
        name:
          - iptables
          - iptables-persistent
        state: present
      environment:
        DEBIAN_FRONTEND: noninteractive

    - name: iptables - Allow established connections
      ansible.builtin.iptables:
        chain: INPUT
        ctstate:
          - ESTABLISHED
          - RELATED
        jump: ACCEPT

    - name: iptables - Allow loopback
      ansible.builtin.iptables:
        chain: INPUT
        in_interface: lo
        jump: ACCEPT

    - name: iptables - Allow SSH
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "22"
        jump: ACCEPT

    - name: iptables - Allow HTTP
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "80"
        jump: ACCEPT

    - name: iptables - Allow HTTPS
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "443"
        jump: ACCEPT

    - name: iptables - Default DROP for INPUT
      ansible.builtin.iptables:
        chain: INPUT
        policy: DROP

    - name: Save iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: true
