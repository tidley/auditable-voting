---
# =============================================================================
# Auth role: Deploy Keycloak OIDC + PostgreSQL for blind auth
# =============================================================================

- name: Validate auth passwords are not defaults (production)
  when: tls_enabled
  ansible.builtin.assert:
    that:
      - keycloak_admin_password != 'changeme-in-production'
      - auth_postgres_password != 'changeme-in-production'
    fail_msg: >
      Default passwords detected in production mode (tls_enabled: true).
      Change keycloak_admin_password and auth_postgres_password in group_vars/all.yml
      or pass them with --extra-vars.

- name: Create auth data directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ auth_data_dir }}"
    - "{{ auth_data_dir }}/postgres-data"
    - "{{ auth_data_dir }}/realm-import"

- name: Template Keycloak realm import
  ansible.builtin.template:
    src: realm-tollgate.json.j2
    dest: "{{ auth_data_dir }}/realm-import/realm-tollgate.json"
    mode: "0644"

- name: Store auth admin credentials for scripts
  ansible.builtin.copy:
    content: |
      KEYCLOAK_ADMIN_USER={{ keycloak_admin_user }}
      KEYCLOAK_ADMIN_PASSWORD={{ keycloak_admin_password }}
      AUTH_POSTGRES_USER={{ auth_postgres_user }}
      AUTH_POSTGRES_PASSWORD={{ auth_postgres_password }}
    dest: "{{ auth_data_dir }}/admin.env"
    mode: "0600"

- name: Template auth docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ auth_data_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start auth services (Keycloak + PostgreSQL)
  community.docker.docker_compose_v2:
    project_src: "{{ auth_data_dir }}"
    state: present
    pull: always

- name: Wait for Keycloak to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:8080/realms/tollgate/.well-known/openid-configuration"
    method: GET
    status_code: 200
  register: kc_health
  retries: 30
  delay: 5
  until: kc_health.status == 200

- name: Print auth details
  ansible.builtin.debug:
    msg: |

      ============================================
       TollGate Auth Services Deployed
      ============================================
       Keycloak URL  : {{ mint_scheme }}://{{ auth_fqdn }}
       OIDC Discovery: {{ auth_openid_discovery }}
       Realm         : tollgate
       Client ID     : cashu-client
       Admin Console : {{ mint_scheme }}://{{ auth_fqdn }}/admin
      ============================================
