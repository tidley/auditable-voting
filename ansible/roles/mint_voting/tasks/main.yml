---
- name: Create mint data directory
  ansible.builtin.file:
    path: "{{ mint_data_dir }}"
    state: directory
    mode: "0755"

- name: Check if mint mnemonic exists
  ansible.builtin.stat:
    path: "{{ mint_data_dir }}/mnemonic.txt"
  register: mint_mnemonic_stat

- name: Generate mint mnemonic
  ansible.builtin.command:
    cmd: python3 -c "from mnemonic import Mnemonic; print(Mnemonic('english').generate(strength=128))"
  register: generated_mnemonic
  changed_when: false
  when: not mint_mnemonic_stat.stat.exists

- name: Persist mint mnemonic
  ansible.builtin.copy:
    content: "{{ generated_mnemonic.stdout }}\n"
    dest: "{{ mint_data_dir }}/mnemonic.txt"
    mode: "0600"
  when: not mint_mnemonic_stat.stat.exists

- name: Load mint mnemonic
  ansible.builtin.slurp:
    src: "{{ mint_data_dir }}/mnemonic.txt"
  register: mint_mnemonic_file

- name: Set mint mnemonic fact
  ansible.builtin.set_fact:
    mint_mnemonic: "{{ mint_mnemonic_file.content | b64decode | trim }}"

- name: Template mint docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mint_data_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start mint container
  community.docker.docker_compose_v2:
    project_src: "{{ mint_data_dir }}"
    state: present
    pull: never
    recreate: always

- name: Wait for mint to be healthy
  ansible.builtin.command:
    cmd: "curl -sf -H 'Host: {{ mint_fqdn }}' http://127.0.0.1/v1/info"
  register: mint_health
  retries: 10
  delay: 5
  until: mint_health.rc == 0
  changed_when: false
  ignore_errors: true

- name: Derive coordinator Nostr keys from mnemonic
  ansible.builtin.command:
    cmd: "python3 {{ derive_script_path }} '{{ mint_mnemonic }}'"
  register: coordinator_keys
  changed_when: false

- name: Parse coordinator keys
  ansible.builtin.set_fact:
    coordinator_info: "{{ coordinator_keys.stdout | from_json }}"

- name: Record coordinator metadata
  ansible.builtin.copy:
    content: |
      name={{ coordinator_name }}
      subdomain={{ coordinator_subdomain }}
      fqdn={{ mint_fqdn }}
      mnemonic={{ mint_mnemonic }}
      nsec={{ coordinator_info.nsec }}
      npub={{ coordinator_info.npub }}
      pubkey_hex={{ coordinator_info.pubkey_hex }}
      grpc_port={{ coordinator_grpc_port }}
      created={{ ansible_date_time.iso8601 }}
    dest: "{{ mint_data_dir }}/coordinator.env"
    mode: "0600"
