---
# =============================================================================
# Traefik role: Deploy reverse proxy with wildcard TLS
# =============================================================================

- name: Stop containers using port 80
  ansible.builtin.shell: |
    for cid in $(docker ps -q --filter "publish=80"); do
      name=$(docker inspect --format '{{ '{{' }}.Name{{ '}}' }}' "$cid" | sed 's|^/||')
      if [ "$name" != "traefik" ]; then
        docker update --restart=no "$cid" 2>/dev/null || true
        docker stop "$cid" 2>/dev/null || true
        echo "Stopped: $name"
      fi
    done
  register: port_cleanup
  changed_when: port_cleanup.stdout | length > 0

- name: Template Traefik static config
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: "{{ traefik_data_dir }}/traefik.yml"
    mode: "0644"

- name: Ensure ACME storage file exists
  ansible.builtin.file:
    path: "{{ traefik_data_dir }}/acme/acme.json"
    state: touch
    mode: "0600"

- name: Template Traefik docker-compose
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ traefik_data_dir }}/docker-compose.yml"
    mode: "0644"

- name: Start Traefik
  community.docker.docker_compose_v2:
    project_src: "{{ traefik_data_dir }}"
    state: present
    pull: always
