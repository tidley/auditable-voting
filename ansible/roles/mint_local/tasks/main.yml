---
# =============================================================================
# Local mint role: Deploy multiple CDK Cashu mints on localhost (Docker)
# =============================================================================

- name: Validate local mints configuration
  ansible.builtin.assert:
    that:
      - mints is defined
      - mints | length > 0
    fail_msg: "Local mint deployment requires a non-empty 'mints' list."

- name: Ensure base mint data directory exists
  ansible.builtin.file:
    path: "{{ mint_data_base_dir }}"
    state: directory
    mode: "0755"

- name: Install Python libraries for local mint setup
  ansible.builtin.pip:
    name:
      - mnemonic
    state: present
    break_system_packages: true

- name: Set mint host facts
  ansible.builtin.set_fact:
    mint_public_host_resolved: "{{ mint_public_host | default(ansible_host | default(inventory_hostname)) }}"
    mint_bind_host_resolved: "{{ mint_bind_host | default('0.0.0.0') }}"
    mint_management_bind_host_resolved: "{{ mint_management_bind_host | default('0.0.0.0') }}"

- name: Set local mint image
  ansible.builtin.set_fact:
    local_mint_image: "{{ cdk_mintd_local_image | default('cdk-mint:manual-approval') }}"

- name: Build local mint image
  when: cdk_build_local_image | default(false) | bool
  block:
    - name: Validate local repo path (sync mode)
      when: (cdk_repo_source | default('git')) == 'sync'
      ansible.builtin.stat:
        path: "{{ cdk_repo_path_local | default('') }}"
      delegate_to: localhost
      become: false
      register: cdk_repo_local_stat

    - name: Abort if local repo path is missing (sync mode)
      when: (cdk_repo_source | default('git')) == 'sync' and not cdk_repo_local_stat.stat.exists
      ansible.builtin.fail:
        msg: "Local repo not found at {{ cdk_repo_path_local }}. Set cdk_repo_path_local or clone it first."

    - name: Archive CDK repo on control machine (sync mode)
      when: (cdk_repo_source | default('git')) == 'sync'
      ansible.builtin.archive:
        path: "{{ cdk_repo_path_local }}"
        dest: "/tmp/cdk-repo-sync.tar.gz"
        format: gz
        exclude_path:
          - "{{ cdk_repo_path_local }}/.git"
      delegate_to: localhost
      become: false

    - name: Ensure CDK repo destination exists (sync mode)
      when: (cdk_repo_source | default('git')) == 'sync'
      ansible.builtin.file:
        path: "{{ cdk_repo_path }}"
        state: directory
        mode: "0755"

    - name: Extract CDK repo on target (sync mode)
      when: (cdk_repo_source | default('git')) == 'sync'
      ansible.builtin.unarchive:
        src: "/tmp/cdk-repo-sync.tar.gz"
        dest: "{{ cdk_repo_path }}"
        remote_src: false
        extra_opts:
          - "--strip-components=1"

    - name: Clone or update CDK repo (git mode)
      when: (cdk_repo_source | default('git')) != 'sync'
      ansible.builtin.git:
        repo: "{{ cdk_repo_url | default('https://github.com/cashubtc/cdk.git') }}"
        dest: "{{ cdk_repo_path }}"
        version: "{{ cdk_repo_branch | default('feat/fakewallet-manual-approval') }}"
        update: true

    - name: Build and load CDK mint image from control machine
      when: (cdk_image_source | default('remote_build')) == 'local_load'
      block:
        - name: Build CDK mint image on control machine
          community.docker.docker_image:
            name: "{{ local_mint_image }}"
            build:
              path: "{{ cdk_repo_path_local | default(cdk_repo_path) }}"
            source: build
          delegate_to: localhost
          become: false

        - name: Save CDK mint image on control machine
          ansible.builtin.command:
            cmd: "docker save -o /tmp/cdk-mint-image.tar {{ local_mint_image }}"
          delegate_to: localhost
          become: false

        - name: Upload CDK mint image to target
          ansible.builtin.copy:
            src: "/tmp/cdk-mint-image.tar"
            dest: "/tmp/cdk-mint-image.tar"
            mode: "0644"

        - name: Load CDK mint image on target
          ansible.builtin.command:
            cmd: "docker load -i /tmp/cdk-mint-image.tar"

    - name: Build CDK mint image on target
      when: (cdk_image_source | default('remote_build')) != 'local_load'
      community.docker.docker_image:
        name: "{{ local_mint_image }}"
        build:
          path: "{{ cdk_repo_path }}"
        source: build

- name: Check local mint image exists
  community.docker.docker_image_info:
    name: "{{ local_mint_image }}"
  register: local_mint_image_info

- name: Abort if local mint image is missing
  ansible.builtin.fail:
    msg: >
      Local mint image '{{ local_mint_image }}' not found. Build it first:
        cd /home/c03rad0r/cdk
        git checkout feat/fakewallet-manual-approval
        docker build -t {{ local_mint_image }} .
  when: local_mint_image_info.images | length == 0

- name: Check if grpcurl is installed
  ansible.builtin.stat:
    path: /usr/local/bin/grpcurl
  register: grpcurl_stat

- name: Detect system architecture
  ansible.builtin.set_fact:
    grpcurl_arch: "{{ 'linux_arm64' if ansible_architecture == 'aarch64' else 'linux_x86_64' }}"

- name: Download grpcurl
  when: not grpcurl_stat.stat.exists
  ansible.builtin.get_url:
    url: "https://github.com/fullstorydev/grpcurl/releases/download/v1.9.1/grpcurl_1.9.1_{{ grpcurl_arch }}.tar.gz"
    dest: "/tmp/grpcurl.tar.gz"
    mode: "0644"

- name: Create grpcurl extract directory
  when: not grpcurl_stat.stat.exists
  ansible.builtin.file:
    path: "/tmp/grpcurl-extract"
    state: directory
    mode: "0755"

- name: Extract grpcurl
  when: not grpcurl_stat.stat.exists
  ansible.builtin.unarchive:
    src: "/tmp/grpcurl.tar.gz"
    dest: "/tmp/grpcurl-extract"
    remote_src: true

- name: Install grpcurl binary
  when: not grpcurl_stat.stat.exists
  ansible.builtin.copy:
    src: "/tmp/grpcurl-extract/grpcurl"
    dest: "/usr/local/bin/grpcurl"
    mode: "0755"
    remote_src: true

- name: Clean up grpcurl temp files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/grpcurl.tar.gz
    - /tmp/grpcurl-extract

- name: Verify grpcurl installation
  ansible.builtin.command: grpcurl --version
  register: grpcurl_version
  changed_when: false

- name: Detect firewall backend
  ansible.builtin.shell: which ufw >/dev/null 2>&1 && echo ufw || echo iptables
  register: firewall_backend
  changed_when: false

- name: Open mint HTTP ports in UFW
  when: firewall_backend.stdout == 'ufw'
  community.general.ufw:
    rule: allow
    port: "{{ item.http_port }}"
    proto: tcp
  loop: "{{ mints }}"
  loop_control:
    label: "{{ item.name }}:{{ item.http_port }}"

- name: Open mint gRPC ports in UFW
  when: firewall_backend.stdout == 'ufw'
  community.general.ufw:
    rule: allow
    port: "{{ item.grpc_port }}"
    proto: tcp
  loop: "{{ mints }}"
  loop_control:
    label: "{{ item.name }}:{{ item.grpc_port }}"

- name: Open mint HTTP ports in iptables
  when: firewall_backend.stdout == 'iptables'
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item.http_port }}"
    jump: ACCEPT
  loop: "{{ mints }}"
  loop_control:
    label: "{{ item.name }}:{{ item.http_port }}"

- name: Open mint gRPC ports in iptables
  when: firewall_backend.stdout == 'iptables'
  ansible.builtin.iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "{{ item.grpc_port }}"
    jump: ACCEPT
  loop: "{{ mints }}"
  loop_control:
    label: "{{ item.name }}:{{ item.grpc_port }}"

- name: Save iptables rules
  when: firewall_backend.stdout == 'iptables'
  ansible.builtin.command: netfilter-persistent save
  changed_when: true

- name: Deploy local mint containers
  ansible.builtin.include_tasks: mint.yml
  loop: "{{ mints }}"
  loop_control:
    label: "{{ item.name }}"
