# =============================================================================
# Auditable Voting - Main Entry Point
# =============================================================================
#
# Deploy everything + publish SEC-06 election:
#
#   ansible-playbook ansible/playbook.yml --tags prepare
#
# Deploy coordinator only:
#   ansible-playbook ansible/playbook.yml --tags coordinator
#
# Deploy voting client only:
#   ansible-playbook ansible/playbook.yml --tags client
#
# Verify infrastructure (no changes):
#   ansible-playbook ansible/playbook.yml --tags verify
#
# Local dev build (localhost, no VPS):
#   ansible-playbook ansible/playbook.yml --tags local-dev
#
# =============================================================================

---
- name: Deploy Voting Coordinator
  ansible.builtin.import_playbook: playbooks/deploy-coordinator.yml
  tags: [coordinator]

- name: Deploy Voting Client
  ansible.builtin.import_playbook: playbooks/deploy-voting-client.yml
  tags: [client]

- name: Verify Deployed Infrastructure
  ansible.builtin.import_playbook: playbooks/verify.yml
  tags: [verify]

- name: Deploy and Prepare (full stack + election)
  ansible.builtin.import_playbook: playbooks/deploy-and-prepare.yml
  tags: [prepare]

- name: Local Dev Build
  hosts: localhost
  connection: local
  become: yes
  tags: [local-dev]
  vars:
    app_dir: "{{ playbook_dir | dirname }}"
    node_version: "20"

  tasks:
    - name: Install system dependencies
      ansible.builtin.apt:
        name:
          - git
          - curl
          - build-essential
        state: present
        update_cache: yes

    - name: Install NodeSource GPG key
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg

    - name: Add NodeSource repository
      ansible.builtin.shell: |
        echo "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: yes

    - name: Install root npm dependencies
      ansible.builtin.shell: npm install
      args:
        chdir: "{{ app_dir }}"

    - name: Build TypeScript project
      ansible.builtin.shell: npm run build
      args:
        chdir: "{{ app_dir }}"

    - name: Install frontend dependencies
      ansible.builtin.shell: npm install
      args:
        chdir: "{{ app_dir }}/web"

    - name: Build frontend
      ansible.builtin.shell: npm run build
      args:
        chdir: "{{ app_dir }}/web"

    - name: Print usage
      ansible.builtin.debug:
        msg:
          - "=== Local Dev Build Complete ==="
          - "Run: cd web && npx vite --host"
          - "Or:  cd web && npx vite preview --host"
