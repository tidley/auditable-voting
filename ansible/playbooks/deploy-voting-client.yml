---
- name: Deploy Voting Client
  hosts: voting_servers
  become: true
  vars:
    app_local_dir: "{{ playbook_dir | dirname | dirname }}"
    effective_domain: "{{ (vps_ip + '.sslip.io') | replace('.', '-', 1) | replace('-sslip-io', '.sslip.io') | default(vps_ip + '.sslip.io') }}"
    voting_fqdn: "{{ voting_subdomain }}.mints.{{ vps_ip }}.sslip.io"

  tasks:

    # ── Setup ────────────────────────────────────────────────────────

    - name: Install system packages
      ansible.builtin.apt:
        name:
          - git
          - curl
          - rsync
          - build-essential
        state: present
        update_cache: true
      tags: [setup]

    - name: Install NodeSource GPG key
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /usr/share/keyrings/nodesource.gpg
      args:
        creates: /usr/share/keyrings/nodesource.gpg
      tags: [setup]

    - name: Add NodeSource repository
      ansible.builtin.shell: |
        echo "deb [signed-by=/usr/share/keyrings/nodesource.gpg] https://deb.nodesource.com/node_{{ node_version }}.x nodistro main" > /etc/apt/sources.list.d/nodesource.list
      args:
        creates: /etc/apt/sources.list.d/nodesource.list
      tags: [setup]

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present
        update_cache: true
      tags: [setup]

    - name: Check installed Node.js version
      ansible.builtin.command: node --version
      register: node_version_check
      changed_when: false
      tags: [setup]

    - name: Print Node.js version
      ansible.builtin.debug:
        msg: "Node.js {{ node_version_check.stdout }}"
      tags: [setup]

    # ── Deploy ───────────────────────────────────────────────────────

    - name: Create deploy directory
      ansible.builtin.file:
        path: "{{ app_deploy_dir }}"
        state: directory
        mode: "0755"
      tags: [deploy]

    - name: Sync repo to remote
      ansible.builtin.synchronize:
        src: "{{ app_local_dir }}/"
        dest: "{{ app_deploy_dir }}/"
        delete: true
        rsync_opts:
          - "--exclude=node_modules"
          - "--exclude=dist"
          - "--exclude=.git"
          - "--exclude=.env"
          - "--exclude=web/dist"
          - "--exclude=web/node_modules"
      tags: [deploy]

    - name: Install root npm dependencies
      ansible.builtin.shell: npm install --production=false
      args:
        chdir: "{{ app_deploy_dir }}"
      tags: [deploy]

    - name: Build root TypeScript
      ansible.builtin.shell: npm run build
      args:
        chdir: "{{ app_deploy_dir }}"
      tags: [deploy]

    - name: Install web npm dependencies
      ansible.builtin.shell: npm install --production=false
      args:
        chdir: "{{ app_deploy_dir }}/web"
      tags: [deploy]

    - name: Run frontend unit tests
      ansible.builtin.shell: npx vitest run
      args:
        chdir: "{{ app_deploy_dir }}/web"
      tags: [deploy]

    - name: Build web frontend
      ansible.builtin.shell: |
        VITE_USE_MOCK=false VITE_COORDINATOR_URL=/api VITE_MINT_URL=/mint npm run build
      args:
        chdir: "{{ app_deploy_dir }}/web"
      tags: [deploy]

    - name: Deploy container nginx config
      ansible.builtin.template:
        src: nginx.conf.j2
        dest: "{{ app_deploy_dir }}/nginx.conf"
        mode: "0644"
      tags: [deploy]

    - name: Deploy docker-compose.yml
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ app_deploy_dir }}/docker-compose.yml"
        mode: "0644"
      tags: [deploy]

    - name: Ensure Docker network exists
      ansible.builtin.docker_network:
        name: "{{ docker_network_name }}"
        state: present
        driver: bridge
      tags: [deploy]

    - name: Start voting-client container
      ansible.builtin.shell: docker compose up -d --force-recreate
      args:
        chdir: "{{ app_deploy_dir }}"
      tags: [deploy]

    - name: Wait for container to become healthy
      ansible.builtin.shell: docker inspect --format '{{ "{{.State.Health.Status}}" }}' voting-client
      register: health_status
      retries: 12
      delay: 5
      until: health_status.stdout == "healthy"
      changed_when: false
      tags: [deploy]

    - name: Print container status
      ansible.builtin.debug:
        msg: "voting-client container is {{ health_status.stdout }}"
      tags: [deploy]

    # ── Verify ───────────────────────────────────────────────────────

    - name: Verify frontend serves via Traefik
      ansible.builtin.uri:
        url: "http://127.0.0.1/"
        headers:
          Host: "{{ voting_fqdn }}"
        method: GET
      register: frontend_check
      changed_when: false
      tags: [verify]

    - name: Assert frontend returns 200
      ansible.builtin.assert:
        that:
          - frontend_check.status == 200
        fail_msg: "Frontend not reachable via Traefik: HTTP {{ frontend_check.status }}"
      tags: [verify]

    - name: Verify API proxy works
      ansible.builtin.uri:
        url: "http://127.0.0.1/api/info"
        headers:
          Host: "{{ voting_fqdn }}"
        method: GET
      register: api_check
      changed_when: false
      failed_when: false
      tags: [verify]

    - name: Print API proxy result
      ansible.builtin.debug:
        msg: >-
          API proxy: {{ 'OK' if api_check.status == 200 else 'NOT REACHABLE (status '
          + (api_check.status | string) + ') -- coordinator may not be running on this host' }}
      tags: [verify]

    - name: Print deployment summary
      ansible.builtin.debug:
        msg:
          - "=== Voting Client Deployed ==="
          - "Deploy directory: {{ app_deploy_dir }}"
          - "Container: voting-client (nginx:alpine)"
          - "Network: {{ docker_network_name }}"
          - "Coordinator URL: {{ coordinator_url }}"
          - "Mint URL: {{ mint_url }}"
          - "Frontend: http://{{ voting_fqdn }}/"
          - "API proxy:  http://{{ voting_fqdn }}/api/"
          - "Mint proxy: http://{{ voting_fqdn }}/mint/"
          - "TLS: {{ 'enabled' if tls_enabled else 'disabled (HTTP only)' }}"
          - ""
          - "Build env vars:"
          - "  VITE_USE_MOCK=false"
          - "  VITE_COORDINATOR_URL=/api"
          - "  VITE_MINT_URL=/mint"
      tags: [verify]
