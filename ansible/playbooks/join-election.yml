---
# Join Election: join an existing election as a participating coordinator
#
# Usage:
#   ansible-playbook ansible/playbooks/join-election.yml \
#     -e "election_id=<38008_event_id>" \
#     -e "eligible_path=./eligible-voters.json"
#
# This playbook:
# 1. Fetches the 38008 event from the relay
# 2. Computes the Merkle root of the local eligible-voters.json
# 3. Verifies the local root matches the canonical root from 38008
# 4. Publishes kind 38007 (join event with eligible-root commitment)
# 5. Publishes kind 38009 (eligibility set commitment)
# 6. Publishes kind 38012 (coordinator info)
#
# Prerequisites:
#   - Coordinator + mint already deployed on this VPS
#   - eligible-voters.json matches the canonical eligible set

- name: Join Existing Election
  hosts: tollgate-vps
  become: true
  vars:
    coordinator_dir: "/opt/tollgate/coordinator"
    coordinator_venv: "{{ coordinator_dir }}/.venv"

  tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - election_id is defined
          - election_id | length > 10
        fail_msg: "election_id (38008 event ID) is required"

    - name: Set default eligible path
      ansible.builtin.set_fact:
        eligible_path: "{{ eligible_path | default(coordinator_dir + '/eligible-voters.json') }}"

    - name: Wait for coordinator to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/info"
        method: GET
      register: coord_info
      retries: 15
      delay: 3
      until: coord_info.status == 200
      changed_when: false

    - name: Read coordinator nsec
      ansible.builtin.slurp:
        src: "{{ coordinator_dir }}/nsec.env"
      register: nsec_raw
      changed_when: false

    - name: Set coordinator nsec fact
      ansible.builtin.set_fact:
        coordinator_nsec: "{{ nsec_raw.content | b64decode | trim }}"

    - name: Compute local eligible root
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import json, hashlib
        from nostr_sdk import PublicKey

        raw = open("{{ eligible_path }}").read()
        npubs = json.loads(raw)
        if isinstance(npubs, dict):
            npubs = npubs.get("npubs", npubs.get("eligible_npubs", []))

        hex_npubs = []
        for n in npubs:
            n = n.strip()
            if not n:
                continue
            if n.startswith("npub1"):
                hex_npubs.append(PublicKey.parse(n).to_hex())
            else:
                hex_npubs.append(n)

        leaves = sorted(hashlib.sha256(n.encode()).hexdigest() for n in hex_npubs)

        def build_root(leaves):
            while len(leaves) > 1:
                if len(leaves) % 2 == 1:
                    leaves.append(leaves[-1])
                next_level = []
                for i in range(0, len(leaves), 2):
                    parent = hashlib.sha256((leaves[i] + leaves[i+1]).encode()).hexdigest()
                    next_level.append(parent)
                leaves = next_level
            return leaves[0] if leaves else None

        root = build_root(leaves)
        print(json.dumps({"root": root, "count": len(hex_npubs)}))
        PYEOF
      args:
        executable: /bin/bash
      register: eligible_data
      changed_when: false

    - name: Parse local eligible root data
      ansible.builtin.set_fact:
        local_eligible_root: "{{ (eligible_data.stdout | from_json).root }}"
        local_eligible_count: "{{ (eligible_data.stdout | from_json).count }}"

    - name: Fetch 38008 event from relay and verify eligible root
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import asyncio, json
        from nostr_sdk import Keys, Kind, NostrSigner, Client, Filter, EventBuilder, Tag, RelayUrl
        from datetime import timedelta

        async def main():
            nsec = "{{ coordinator_nsec }}"
            election_id = "{{ election_id }}"

            keys = Keys.parse(nsec)
            signer = NostrSigner.keys(keys)
            client = Client(signer)
            await client.add_relay(RelayUrl.parse("ws://localhost:10547"))
            await client.connect()
            await asyncio.sleep(2)

            event_filter = Filter().kinds([Kind(38008)]).ids([election_id]).limit(1)
            events = await client.fetch_events(event_filter, timeout=timedelta(seconds=15))
            events_vec = events.to_vec()

            if not events_vec:
                print(json.dumps({"error": "Election event not found on relay"}))
                return

            evt = events_vec[0]
            content = json.loads(evt.content)

            canonical_root = None
            canonical_count = None
            vote_start = content.get("vote_start", content.get("start_time", 0))
            vote_end = content.get("vote_end", content.get("end_time", 0))
            confirm_end = content.get("confirm_end", vote_end + 3600)

            for tag in evt.tags():
                tag_vec = tag.to_vec()
                if len(tag_vec) >= 2:
                    key = tag_vec[0]
                    val = tag_vec[1]
                    if key == "eligible-root":
                        canonical_root = val
                    elif key == "eligible-count":
                        canonical_count = int(val)

            print(json.dumps({
                "canonical_root": canonical_root,
                "canonical_count": canonical_count,
                "vote_start": vote_start,
                "vote_end": vote_end,
                "confirm_end": confirm_end,
                "title": content.get("title", "Unknown"),
            }))

        asyncio.run(main())
        PYEOF
      args:
        executable: /bin/bash
      register: election_data
      changed_when: false

    - name: Parse election data
      ansible.builtin.set_fact:
        canonical_root: "{{ (election_data.stdout | from_json).canonical_root }}"
        canonical_count: "{{ (election_data.stdout | from_json).canonical_count }}"
        vote_start: "{{ (election_data.stdout | from_json).vote_start }}"
        vote_end: "{{ (election_data.stdout | from_json).vote_end }}"
        confirm_end: "{{ (election_data.stdout | from_json).confirm_end }}"
        election_title: "{{ (election_data.stdout | from_json).title }}"

    - name: Verify eligible root matches
      ansible.builtin.assert:
        that:
          - local_eligible_root == canonical_root
        fail_msg: |
          Eligible root mismatch!
          Local root:  {{ local_eligible_root }}
          Canonical:    {{ canonical_root }}
          Your eligible-voters.json does not match the canonical eligible set.

    - name: Publish kind 38007 (join event)
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import asyncio, json
        from nostr_sdk import Keys, Kind, NostrSigner, Client, EventBuilder, Tag, RelayUrl

        async def main():
            nsec = "{{ coordinator_nsec }}"
            election_id = "{{ election_id }}"
            content = json.dumps({
                "election_id": election_id,
                "max_supply": {{ canonical_count | default(local_eligible_count) }},
                "vote_start": {{ vote_start }},
                "vote_end": {{ vote_end }},
                "confirm_end": {{ confirm_end }},
            })

            signer = NostrSigner.keys(Keys.parse(nsec))
            client = Client(signer)
            await client.add_relay(RelayUrl.parse("ws://localhost:10547"))
            await client.connect()
            await asyncio.sleep(1)

            tags = [
                Tag.parse(["election", election_id]),
                Tag.parse(["eligible-root", "{{ canonical_root }}"]),
                Tag.parse(["eligible-count", "{{ canonical_count | default(local_eligible_count) }}"]),
            ]
            builder = EventBuilder(kind=Kind(38007), content=content).tags(tags)
            await client.send_event_builder(builder)
            await asyncio.sleep(1)
            print("OK")

        asyncio.run(main())
        PYEOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Publish kind 38009 (eligibility commitment)
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import asyncio, json
        from nostr_sdk import Keys, Kind, NostrSigner, Client, EventBuilder, Tag, RelayUrl

        async def main():
            nsec = "{{ coordinator_nsec }}"
            election_id = "{{ election_id }}"
            content = json.dumps({
                "election_id": election_id,
                "eligible_root": "{{ canonical_root }}",
                "eligible_count": {{ canonical_count | default(local_eligible_count) }},
            })

            signer = NostrSigner.keys(Keys.parse(nsec))
            client = Client(signer)
            await client.add_relay(RelayUrl.parse("ws://localhost:10547"))
            await client.connect()
            await asyncio.sleep(1)

            tags = [Tag.parse(["election", election_id])]
            builder = EventBuilder(kind=Kind(38009), content=content).tags(tags)
            await client.send_event_builder(builder)
            await asyncio.sleep(1)
            print("OK")

        asyncio.run(main())
        PYEOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Publish kind 38012 (coordinator info)
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import asyncio, json
        from nostr_sdk import Keys, Kind, NostrSigner, Client, EventBuilder, Tag, RelayUrl

        async def main():
            nsec = "{{ coordinator_nsec }}"
            content = json.dumps({
                "http_api": "http://{{ ansible_host }}:8081",
                "mint_url": "http://{{ ansible_host }}:3338",
                "supported_relays": ["ws://localhost:10547", "wss://relay.damus.io", "wss://nos.lol", "wss://relay.primal.net"],
            })

            signer = NostrSigner.keys(Keys.parse(nsec))
            client = Client(signer)
            await client.add_relay(RelayUrl.parse("ws://localhost:10547"))
            await client.connect()
            await asyncio.sleep(1)

            tags = [Tag.parse(["t", "coordinator-info"])]
            builder = EventBuilder(kind=Kind(38012), content=content).tags(tags)
            await client.send_event_builder(builder)
            await asyncio.sleep(1)
            print("OK")

        asyncio.run(main())
        PYEOF
      args:
        executable: /bin/bash
      changed_when: true

    - name: Print join info
      ansible.builtin.debug:
        msg: |
          Successfully joined election!
          Election: {{ election_title }} ({{ election_id }})
          Eligible root verified: {{ canonical_root }}
          Eligible count: {{ canonical_count | default(local_eligible_count) }}
          Vote window: {{ vote_start }} - {{ vote_end }}
          Confirm window: {{ vote_end }} - {{ confirm_end }}
