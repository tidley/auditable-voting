---
- name: Local Multi-Mint Deployment (Docker)
  hosts: mint_hosts
  become: true

  roles:
    - role: mint_local

  post_tasks:
    - name: Print local mint endpoints
      ansible.builtin.debug:
        msg: "{{ item.name }} -> http://127.0.0.1:{{ item.http_port }} (gRPC: 127.0.0.1:{{ item.grpc_port }})"
      loop: "{{ mints }}"

    - name: Verify gRPC port is listening on each mint
      ansible.builtin.shell: "ss -tlnp sport = :{{ item.grpc_port }}"
      register: grpc_check_results
      loop: "{{ mints }}"
      loop_control:
        label: "{{ item.name }}:{{ item.grpc_port }}"
      changed_when: false
      ignore_errors: true

    - name: Verify HTTP health on each mint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ item.http_port }}/v1/info"
        method: GET
      register: http_health_results
      loop: "{{ mints }}"
      loop_control:
        label: "{{ item.name }}:{{ item.http_port }}"
      changed_when: false
      ignore_errors: true

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "=== Mint Deployment Verification ==="
          - ""
          - "{% for r in grpc_check_results.results %}{% if r.rc == 0 %}[OK]   {{ r.item.name }} gRPC (port {{ r.item.grpc_port }}): listening{% else %}[FAIL] {{ r.item.name }} gRPC (port {{ r.item.grpc_port }}): not listening{% endif %}{% endfor %}"
          - ""
          - "{% for r in http_health_results.results %}{% if r.failed != true %}[OK]   {{ r.item.name }} HTTP (port {{ r.item.http_port }}): pubkey={{ r.json.pubkey }} version={{ r.json.version }}{% else %}[FAIL] {{ r.item.name }} HTTP (port {{ r.item.http_port }}): no response{% endif %}{% endfor %}"
          - ""
          - "grpcurl installed: {{ true if grpcurl_check is defined else 'unknown' }} (note: gRPC reflection not supported by CDK, use proto files with grpcurl)"

