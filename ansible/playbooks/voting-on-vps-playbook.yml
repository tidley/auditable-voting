# =============================================================================
# TollGate Voting Mint Deployment (VPS)
# =============================================================================
#
# Deploy 3 CDK Cashu mints on a VPS via Traefik for the auditable voting demo.
# Each mint is operated by a vote coordinator. Coordinator Nostr keys are
# derived from the mint mnemonic (BIP32 master key).
#
# TESTING (no domain needed):
#
#   ansible-playbook playbooks/voting-on-vps-playbook.yml \
#     -i inventory/hosts.yml \
#     -e vps_ip=23.182.128.64
#
#   Mints at:
#     http://mint-a.mints.23.182.128.64.sslip.io
#     http://mint-b.mints.23.182.128.64.sslip.io
#     http://mint-c.mints.23.182.128.64.sslip.io
#
# PRODUCTION (with domain + TLS):
#
#   1. Set tls_enabled: true and configure mint_domain + ACME in group_vars/all.yml
#   2. Run setup first:
#        ansible-playbook playbooks/voting-on-vps-playbook.yml \
#          -i inventory/hosts.yml -e vps_ip=23.182.128.64 --tags setup
#   3. Deploy mints:
#        ansible-playbook playbooks/voting-on-vps-playbook.yml \
#          -i inventory/hosts.yml -e vps_ip=23.182.128.64 --tags mint
#
# =============================================================================

---
- name: TollGate Voting Mint Deployment (VPS)
  hosts: tollgate-vps
  become: true

  vars_files:
    - "{{ playbook_dir }}/../inventory/group_vars/all.yml"

  vars:
    voting_mint_image: "cdk-mint:manual-approval"
    voting_data_dir: "/opt/tollgate/mints-voting"
    derive_script_path: "/opt/tollgate/derive-coordinator-keys.py"
    voting_coordinators:
      - name: mint-a
        subdomain: mint-a
        grpc_port: 8086
      - name: mint-b
        subdomain: mint-b
        grpc_port: 8087
      - name: mint-c
        subdomain: mint-c
        grpc_port: 8088

  pre_tasks:
    - name: Set effective domain (test mode - sslip.io)
      when: not tls_enabled
      ansible.builtin.set_fact:
        effective_domain: "mints.{{ vps_ip }}.sslip.io"
        mint_scheme: "http"

    - name: Set effective domain (production - real domain)
      when: tls_enabled
      ansible.builtin.set_fact:
        effective_domain: "{{ mint_domain }}"
        mint_scheme: "https"

    - name: Print deployment configuration
      ansible.builtin.debug:
        msg:
          - "=== Voting Mint Deployment Config ==="
          - "Base domain : {{ mint_scheme }}://*.{{ effective_domain }}"
          - "Image       : {{ voting_mint_image }}"
          - "Data dir    : {{ voting_data_dir }}"
          - "Coordinators:"
          - "{% for c in voting_coordinators %}  {{ c.name }} -> {{ mint_scheme }}://{{ c.subdomain }}.{{ effective_domain }} (gRPC: {{ vps_ip }}:{{ c.grpc_port }}){% endfor %}"

  roles:
    - role: base
      tags: [setup]

    - role: traefik
      tags: [setup]

  tasks:
    - name: Ensure voting data directory exists
      ansible.builtin.file:
        path: "{{ voting_data_dir }}"
        state: directory
        mode: "0755"
      tags: [mint]

    - name: Install Python dependencies for key derivation
      ansible.builtin.pip:
        name:
          - mnemonic
          - bech32
          - coincurve
        state: present
        break_system_packages: true
      tags: [mint]

    - name: Upload derive-coordinator-keys.py to VPS
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../../coordinator/derive-coordinator-keys.py"
        dest: "{{ derive_script_path }}"
        mode: "0755"
      tags: [mint]

    - name: Set voting mint image fact
      ansible.builtin.set_fact:
        local_voting_mint_image: "{{ voting_mint_image }}"
      tags: [mint]

    - name: Build and load custom CDK image from control machine
      when: (cdk_image_source | default('remote_build')) == 'local_load'
      block:
        - name: Build CDK mint image on control machine
          community.docker.docker_image:
            name: "{{ local_voting_mint_image }}"
            build:
              path: "{{ cdk_repo_path_local | default(cdk_repo_path) }}"
            source: build
          delegate_to: localhost
          become: false

        - name: Save CDK mint image on control machine
          ansible.builtin.command:
            cmd: "docker save -o /tmp/cdk-voting-mint-image.tar {{ local_voting_mint_image }}"
          delegate_to: localhost
          become: false

        - name: Upload CDK mint image to target
          ansible.builtin.copy:
            src: "/tmp/cdk-voting-mint-image.tar"
            dest: "/tmp/cdk-voting-mint-image.tar"
            mode: "0644"

        - name: Load CDK mint image on target
          ansible.builtin.command:
            cmd: "docker load -i /tmp/cdk-voting-mint-image.tar"
      tags: [mint]

    - name: Build CDK mint image on target
      when: (cdk_image_source | default('remote_build')) != 'local_load'
      community.docker.docker_image:
        name: "{{ local_voting_mint_image }}"
        build:
          path: "{{ cdk_repo_path }}"
        source: build
      tags: [mint]

    - name: Check voting mint image exists
      community.docker.docker_image_info:
        name: "{{ local_voting_mint_image }}"
      register: voting_mint_image_info
      tags: [mint]

    - name: Abort if voting mint image is missing
      ansible.builtin.fail:
        msg: >
          Voting mint image '{{ local_voting_mint_image }}' not found.
          Build it first or check cdk_image_source in host_vars.
      when: voting_mint_image_info.images | length == 0
      tags: [mint]

    - name: Detect firewall backend
      ansible.builtin.shell: which ufw >/dev/null 2>&1 && echo ufw || echo iptables
      register: voting_firewall_backend
      changed_when: false
      tags: [mint]

    - name: Open gRPC ports in UFW
      when: voting_firewall_backend.stdout == 'ufw'
      community.general.ufw:
        rule: allow
        port: "{{ item.grpc_port }}"
        proto: tcp
      loop: "{{ voting_coordinators }}"
      loop_control:
        label: "{{ item.name }}:{{ item.grpc_port }}"
      tags: [mint]

    - name: Open gRPC ports in iptables
      when: voting_firewall_backend.stdout == 'iptables'
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ item.grpc_port }}"
        jump: ACCEPT
      loop: "{{ voting_coordinators }}"
      loop_control:
        label: "{{ item.name }}:{{ item.grpc_port }}"
      tags: [mint]

    - name: Save iptables rules
      when: voting_firewall_backend.stdout == 'iptables'
      ansible.builtin.command: netfilter-persistent save
      changed_when: true
      tags: [mint]

    - name: Deploy voting mint containers
      ansible.builtin.include_role:
        name: mint_voting
      loop: "{{ voting_coordinators }}"
      loop_control:
        loop_var: current_coordinator
        label: "{{ current_coordinator.name }}"
      vars:
        coordinator_name: "{{ current_coordinator.name }}"
        coordinator_subdomain: "{{ current_coordinator.subdomain }}"
        coordinator_grpc_port: "{{ current_coordinator.grpc_port }}"
        mint_fqdn: "{{ current_coordinator.subdomain }}.{{ effective_domain }}"
        mint_container_name: "mint-{{ current_coordinator.subdomain }}"
        mint_data_dir: "{{ voting_data_dir }}/{{ current_coordinator.subdomain }}"
      register: coordinator_deploy_results
      tags: [mint]

  post_tasks:
    - name: Verify HTTP health on each voting mint
      ansible.builtin.uri:
        url: "http://127.0.0.1/v1/info"
        method: GET
        headers:
          Host: "{{ item.subdomain }}.{{ effective_domain }}"
        return_content: true
      register: voting_mint_health_results
      loop: "{{ voting_coordinators }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      ignore_errors: true

    - name: Verify gRPC ports listening
      ansible.builtin.shell: "ss -tlnp sport = :{{ item.grpc_port }}"
      register: voting_grpc_check_results
      loop: "{{ voting_coordinators }}"
      loop_control:
        label: "{{ item.name }}:{{ item.grpc_port }}"
      changed_when: false
      ignore_errors: true

    - name: Build vote-coordinators.md content
      ansible.builtin.set_fact:
        vote_coordinators_content: |
          # Vote Coordinators

          {% for r in voting_mint_health_results.results %}
          ## {{ r.item.name }}
          - Mint URL: {{ mint_scheme }}://{{ r.item.subdomain }}.{{ effective_domain }}
          - gRPC: {{ vps_ip }}:{{ r.item.grpc_port }}
          - Mint pubkey: {{ r.json.pubkey if not r.failed else 'UNREACHABLE' }}
          {% endfor %}

          {% for r in coordinator_deploy_results.results %}
          ## {{ r.item.name }} (Coordinator Keys)
          - Nostr identity (nsec): {{ r.coordinator_info.nsec }}
          - Nostr pubkey (npub): {{ r.coordinator_info.npub }}
          - Nostr pubkey (hex): {{ r.coordinator_info.pubkey_hex }}
          {% endfor %}

          Generated: {{ ansible_date_time.iso8601 }}
          Mode: {{ 'PRODUCTION (TLS)' if tls_enabled else 'TEST (HTTP, sslip.io)' }}
          Quorum: 2-of-3

    - name: Write vote-coordinators.md to control machine
      ansible.builtin.copy:
        content: "{{ vote_coordinators_content }}"
        dest: "{{ playbook_dir }}/vote-coordinators.md"
        mode: "0644"
      delegate_to: localhost
      become: false

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "=== Voting Mint Deployment Verification ==="
          - ""
          - "{% for r in voting_mint_health_results.results %}{% if r.failed != true %}[OK]   {{ r.item.name }} -> {{ mint_scheme }}://{{ r.item.subdomain }}.{{ effective_domain }} (pubkey={{ r.json.pubkey }}){% else %}[FAIL] {{ r.item.name }} -> {{ mint_scheme }}://{{ r.item.subdomain }}.{{ effective_domain }} (no response){% endif %}{% endfor %}"
          - ""
          - "{% for r in voting_grpc_check_results.results %}{% if r.rc == 0 %}[OK]   {{ r.item.name }} gRPC ({{ vps_ip }}:{{ r.item.grpc_port }}): listening{% else %}[FAIL] {{ r.item.name }} gRPC ({{ vps_ip }}:{{ r.item.grpc_port }}): not listening{% endif %}{% endfor %}"
          - ""
          - "Total mints deployed: {{ voting_coordinators | length }}"
          - "vote-coordinators.md written to: {{ playbook_dir }}/vote-coordinators.md"
