---
# Verify that the deployed infrastructure is healthy and run integration tests.
- name: Verify deployed infrastructure
  hosts: mint_hosts
  become: true
  tasks:

    - name: Check coordinator service is running
      ansible.builtin.systemd_service:
        name: tollgate-coordinator
      register: _coord_svc
      failed_when: false
      changed_when: false

    - name: Assert coordinator is active
      ansible.builtin.assert:
        that:
          - _coord_svc.status.ActiveState == "active"
        fail_msg: "Coordinator service is not active (state: {{ _coord_svc.status.ActiveState }})"
        quiet: true

    - name: Check coordinator HTTP API
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/info"
        method: GET
        timeout: 10
      register: _coord_info
      changed_when: false

    - name: Assert coordinator /info returns 200
      ansible.builtin.assert:
        that:
          - _coord_info.status == 200
          - "'coordinatorNpub' in _coord_info.json"
          - _coord_info.json.coordinatorNpub | length > 0
        fail_msg: "Coordinator /info unhealthy: HTTP {{ _coord_info.status }}"
        quiet: true

    - name: Check coordinator CORS
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/info"
        method: OPTIONS
        headers:
          Origin: "http://localhost:5173"
          Access-Control-Request-Method: "GET"
        timeout: 10
      register: _coord_cors
      changed_when: false

    - name: Assert coordinator CORS headers present
      ansible.builtin.assert:
        that:
          - _coord_cors.status in [200, 204]
          - (_coord_cors.headers['Access-Control-Allow-Origin'] | default('')) | length > 0
        fail_msg: "Coordinator CORS not configured: HTTP {{ _coord_cors.status }}, ACAO={{ _coord_cors.headers['Access-Control-Allow-Origin'] | default('MISSING') }}"
        quiet: true

    - name: Check mint HTTP API
      ansible.builtin.uri:
        url: "http://127.0.0.1:3338/v1/info"
        method: GET
        timeout: 10
      register: _mint_info
      changed_when: false

    - name: Assert mint /v1/info returns 200
      ansible.builtin.assert:
        that:
          - _mint_info.status == 200
          - "'pubkey' in _mint_info.json"
        fail_msg: "Mint /v1/info unhealthy: HTTP {{ _mint_info.status }}"
        quiet: true

    - name: Verify coordinator and mint pubkey match
      ansible.builtin.assert:
        that:
          - _coord_info.json.mintPublicKey == _mint_info.json.pubkey
        fail_msg: >-
          Coordinator mintPublicKey ({{ _coord_info.json.mintPublicKey }})
          != mint pubkey ({{ _mint_info.json.pubkey }})
        quiet: true

    - name: Verify coordinator returns public mint URL
      ansible.builtin.assert:
        that:
          - "'127.0.0.1' not in _coord_info.json.mintUrl"
          - "'localhost' not in _coord_info.json.mintUrl"
        fail_msg: >-
          Coordinator mintUrl is not public: {{ _coord_info.json.mintUrl }}.
          Voters cannot reach this URL. Use --public-mint-url.
        quiet: true

    - name: Check voting-client container
      ansible.builtin.shell: docker inspect --format '{{ "{{.State.Status}}" }}' voting-client 2>/dev/null || echo "NOT_FOUND"
      register: _vc_status
      changed_when: false
      failed_when: false

    - name: Assert voting-client container is running
      ansible.builtin.assert:
        that:
          - _vc_status.stdout == "running"
        fail_msg: "voting-client container not running: {{ _vc_status.stdout }}"
        quiet: true

    - name: Verify frontend serves HTML
      ansible.builtin.uri:
        url: "http://127.0.0.1/"
        headers:
          Host: "{{ voting_fqdn }}"
        method: GET
      register: _frontend_check
      changed_when: false

    - name: Assert frontend returns 200
      ansible.builtin.assert:
        that:
          - _frontend_check.status == 200
        fail_msg: "Frontend not reachable via Traefik: HTTP {{ _frontend_check.status }}"
        quiet: true

    - name: Verify API proxy to coordinator
      ansible.builtin.uri:
        url: "http://127.0.0.1/api/info"
        headers:
          Host: "{{ voting_fqdn }}"
        method: GET
      register: _api_proxy
      changed_when: false

    - name: Assert API proxy works
      ansible.builtin.assert:
        that:
          - _api_proxy.status == 200
          - "'coordinatorNpub' in _api_proxy.json"
        fail_msg: "API proxy to coordinator failed: HTTP {{ _api_proxy.status }}"
        quiet: true

    - name: Verify mint proxy
      ansible.builtin.uri:
        url: "http://127.0.0.1/mint/v1/info"
        headers:
          Host: "{{ voting_fqdn }}"
        method: GET
      register: _mint_proxy
      changed_when: false

    - name: Assert mint proxy works
      ansible.builtin.assert:
        that:
          - _mint_proxy.status == 200
          - "'pubkey' in _mint_proxy.json"
        fail_msg: "Mint proxy failed: HTTP {{ _mint_proxy.status }}"
        quiet: true

    - name: Print verification summary
      ansible.builtin.debug:
        msg:
          - "=== Infrastructure Verification PASSED ==="
          - "Coordinator: http://{{ ansible_host }}:8081 (npub: {{ _coord_info.json.coordinatorNpub[:20] }}...)"
          - "Mint:        http://{{ ansible_host }}:3338 (pubkey: {{ _mint_info.json.pubkey[:20] }}...)"
          - "Frontend:    http://{{ voting_fqdn }}/"
          - "API proxy:   http://{{ voting_fqdn }}/api/"
          - "Mint proxy:  http://{{ voting_fqdn }}/mint/"
          - "CORS:        enabled"
