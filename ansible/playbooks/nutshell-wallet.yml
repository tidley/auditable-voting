---
- name: Setup Nutshell wallet and test against deployed mints
  hosts: localhost
  connection: local
  become: false

  vars:
    cashu_wallet_dir: "{{ ansible_env.HOME }}/.cashu"
    cashu_venv_dir: "{{ ansible_env.HOME }}/.local/share/cashu-venv"
    remote_mint_host: "{{ vps_ip | default('') }}"

  tasks:
    - name: Check if cashu CLI is installed
      ansible.builtin.shell: "{{ cashu_venv_dir }}/bin/cashu --help 2>/dev/null"
      register: cashu_check
      changed_when: false
      ignore_errors: true

    - name: Create venv for cashu wallet
      when: cashu_check.rc != 0
      ansible.builtin.command:
        cmd: "python3 -m venv {{ cashu_venv_dir }}"
        creates: "{{ cashu_venv_dir }}/bin/python3"

    - name: Install cashu wallet in venv
      when: cashu_check.rc != 0
      ansible.builtin.pip:
        name:
          - "cashu==0.19.2"
          - "marshmallow>=3.0,<4.0"
        virtualenv: "{{ cashu_venv_dir }}"
        virtualenv_command: python3 -m venv

    - name: Write environs compat patch script
      when: cashu_check.rc != 0
      ansible.builtin.copy:
        dest: /tmp/patch_environs.py
        content: |
          import marshmallow
          if not hasattr(marshmallow, '__version_info__'):
              ver = getattr(marshmallow, '__version__', '3.0.0')
              marshmallow.__version_info__ = tuple(int(x) for x in ver.split('.')[:2])
          import importlib, environs
          importlib.reload(environs)
          print('patched ok')
        mode: "0644"

    - name: Patch environs for Python 3.13
      when: cashu_check.rc != 0
      ansible.builtin.command: "{{ cashu_venv_dir }}/bin/python /tmp/patch_environs.py"
      register: environs_patch
      changed_when: false
      ignore_errors: true

    - name: Verify cashu installation
      ansible.builtin.command: "{{ cashu_venv_dir }}/bin/cashu --help"
      register: cashu_version
      changed_when: false
      ignore_errors: true

    - name: Display cashu status
      ansible.builtin.debug:
        msg: "cashu CLI is installed and working"

    - name: Fail if cashu is not working
      ansible.builtin.fail:
        msg: "cashu CLI failed: {{ cashu_version.stderr | default('unknown error') }}"
      when: cashu_version.rc != 0

    - name: Build mint URLs list
      ansible.builtin.set_fact:
        mint_urls: []
      when: remote_mint_host | length > 0

    - name: Append mint URLs
      ansible.builtin.set_fact:
        mint_urls: "{{ mint_urls + ['http://' + remote_mint_host + ':' + (item.http_port | string) + '/v1'] }}"
      loop: "{{ mints }}"
      loop_control:
        label: "{{ item.name | default(item) }}"
      when: remote_mint_host | length > 0

    - name: Fail if no remote mints configured
      ansible.builtin.fail:
        msg: "No remote mints found. Pass -e vps_ip=<IP> to specify the VPS."
      when: mint_urls | length == 0

    - name: Display mint URLs
      ansible.builtin.debug:
        msg: "{{ mint_urls }}"

    - name: Get info from each mint
      ansible.builtin.uri:
        url: "{{ item }}/info"
        method: GET
        return_content: true
      register: mint_info_results
      loop: "{{ mint_urls }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false

    - name: Display mint info
      ansible.builtin.debug:
        var: mint_info_results

    - name: Add mints to cashu wallet
      ansible.builtin.shell: "{{ cashu_venv_dir }}/bin/cashu -h {{ item }} info"
      loop: "{{ mint_urls }}"
      loop_control:
        label: "{{ item }}"
      register: mint_add_results
      changed_when: true
      ignore_errors: true

    - name: Display mint add results
      ansible.builtin.debug:
        var: mint_add_results

    - name: Show wallet info
      ansible.builtin.command: "{{ cashu_venv_dir }}/bin/cashu info"
      register: wallet_info
      changed_when: false
      ignore_errors: true

    - name: Display wallet info
      ansible.builtin.debug:
        var: wallet_info

    - name: Check wallet balance on each mint
      ansible.builtin.command: "{{ cashu_venv_dir }}/bin/cashu -h {{ item }} balance"
      loop: "{{ mint_urls }}"
      loop_control:
        label: "{{ item }}"
      register: wallet_balance
      changed_when: false
      ignore_errors: true

    - name: Display wallet balances
      ansible.builtin.debug:
        var: wallet_balance
