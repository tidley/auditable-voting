---
# Deploy and Prepare: full stack + SEC-06 election publication
#
# Usage:
#   ansible-playbook ansible/playbooks/deploy-and-prepare.yml
#
# This playbook is idempotent and handles any starting state.
# It deploys Traefik, the coordinator, and the voting-client frontend,
# then publishes a SEC-06 feedback election and prints voter-facing URLs.

- name: Ensure Traefik is running
  hosts: tollgate-vps
  become: true
  tasks:
    - name: Set effective domain (test mode - sslip.io)
      when: not (tls_enabled | default(false) | bool)
      ansible.builtin.set_fact:
        effective_domain: "mints.{{ vps_ip }}.sslip.io"
        mint_scheme: "http"
        voting_fqdn: "{{ voting_subdomain }}.mints.{{ vps_ip }}.sslip.io"
        voting_scheme: "http"

    - name: Set effective domain (production - real domain)
      when: tls_enabled | default(false) | bool
      ansible.builtin.set_fact:
        effective_domain: "{{ voting_domain }}"
        mint_scheme: "https"
        voting_fqdn: "{{ voting_subdomain }}.{{ voting_domain }}"
        voting_scheme: "https"

    - name: Print effective domain
      ansible.builtin.debug:
        msg: "Mode: {{ mint_scheme }}://{{ effective_domain }}"

    - name: Ensure tollgate-net Docker network exists
      community.docker.docker_network:
        name: tollgate-net
        state: present
        driver: bridge

    - name: Template Traefik static config
      ansible.builtin.template:
        src: ../roles/traefik/templates/traefik.yml.j2
        dest: "{{ traefik_data_dir }}/traefik.yml"
        mode: "0644"

    - name: Template Traefik docker-compose
      ansible.builtin.template:
        src: ../roles/traefik/templates/docker-compose.yml.j2
        dest: "{{ traefik_data_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Ensure ACME storage directory exists
      ansible.builtin.file:
        path: "{{ traefik_data_dir }}/acme"
        state: directory
        mode: "0755"
      when: tls_enabled | default(false) | bool

    - name: Ensure ACME storage file exists
      ansible.builtin.file:
        path: "{{ traefik_data_dir }}/acme/acme.json"
        state: touch
        mode: "0600"
      when: tls_enabled | default(false) | bool

    - name: Start Traefik via docker-compose
      community.docker.docker_compose_v2:
        project_src: "{{ traefik_data_dir }}"
        state: present
        pull: never
        recreate: always

    - name: Wait for Traefik to be reachable
      ansible.builtin.uri:
        url: "{{ mint_scheme }}://127.0.0.1/"
        method: GET
        status_code: [200, 404]
        validate_certs: false
      register: traefik_health
      retries: 10
      delay: 3
      until: traefik_health is not failed

- name: Deploy Voting Coordinator
  ansible.builtin.import_playbook: update-coordinator-keep-existing-election.yml

- name: Deploy Voting Client
  ansible.builtin.import_playbook: deploy-voting-client.yml

- name: Rotate Mint Keyset for New Election
  hosts: tollgate-vps
  become: true
  vars:
    coordinator_dir: "/opt/tollgate/coordinator"
    coordinator_venv: "{{ coordinator_dir }}/.venv"
    mint_data_dir: "/opt/tollgate/mints-local/mint1"

  tasks:
    - name: Wait for coordinator to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/info"
        method: GET
      register: coord_info
      retries: 15
      delay: 3
      until: coord_info.status == 200
      changed_when: false

    - name: Read coordinator nsec
      ansible.builtin.slurp:
        src: "{{ coordinator_dir }}/nsec.env"
      register: nsec_raw
      changed_when: false

    - name: Set coordinator nsec fact
      ansible.builtin.set_fact:
        coordinator_nsec: "{{ nsec_raw.content | b64decode | trim }}"

    - name: Generate election ID
      ansible.builtin.set_fact:
        election_id: "sec06-feedback-{{ ansible_date_time.epoch | int }}"

    - name: Read current mint mnemonic from docker-compose
      ansible.builtin.shell: grep 'CDK_MINTD_MNEMONIC:' {{ mint_data_dir }}/docker-compose.yml | head -1
      register: old_mnemonic_line
      changed_when: false

    - name: Record old election info for backup
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 -c "
        import json, requests
        try:
            r = requests.get('http://127.0.0.1:8081/election', timeout=5)
            if r.status_code == 200:
                data = r.json()
                print(json.dumps({'election_id': data.get('election_id', ''), 'event_id': data.get('event_id', '')}))
            else:
                print('{}')
        except Exception:
            print('{}')
        "
      register: old_election_info
      changed_when: false

    - name: Derive new mint mnemonic from coordinator nsec + election ID
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import sys, os
        sys.path.insert(0, os.environ.get('COORDINATOR_GEN_DIR', '{{ coordinator_dir }}/_gen'))
        import importlib.util
        spec = importlib.util.spec_from_file_location("voting_coordinator_client", "{{ coordinator_dir }}/voting-coordinator-client.py")
        mod = importlib.util.module_from_spec(spec)
        spec.loader.exec_module(mod)
        print(mod.derive_election_mnemonic("{{ coordinator_nsec }}", "{{ election_id }}"))
        PYEOF
      register: new_mnemonic
      changed_when: true

    - name: Backup current mint database
      ansible.builtin.shell: |
        mkdir -p {{ mint_data_dir }}/backups
        backup_dir="{{ mint_data_dir }}/backups/{{ old_election_info.stdout | from_json | json_query('election_id') | default('pre-' + election_id, true) }}"
        mkdir -p "$backup_dir"
        if [ -f {{ mint_data_dir }}/cdk-mintd.sqlite ]; then
          cp {{ mint_data_dir }}/cdk-mintd.sqlite "$backup_dir/"
        fi
        echo "$backup_dir"
      register: backup_dir
      changed_when: true

    - name: Stop mint container
      community.docker.docker_compose_v2:
        project_src: "{{ mint_data_dir }}"
        state: stopped

    - name: Update mint mnemonic in docker-compose.yml
      ansible.builtin.shell: |
        sed -i 's|CDK_MINTD_MNEMONIC:.*|CDK_MINTD_MNEMONIC: "{{ new_mnemonic.stdout }}"|' {{ mint_data_dir }}/docker-compose.yml
      changed_when: true

    - name: Ensure CDK_MINTD_USE_KEYSET_V2=false in docker-compose.yml
      ansible.builtin.shell: |
        grep -q 'CDK_MINTD_USE_KEYSET_V2' {{ mint_data_dir }}/docker-compose.yml || \
          sed -i '/CDK_MINTD_MINT_MANAGEMENT_PORT/a\      CDK_MINTD_USE_KEYSET_V2: "false"' {{ mint_data_dir }}/docker-compose.yml
        sed -i 's/CDK_MINTD_USE_KEYSET_V2: "true"/CDK_MINTD_USE_KEYSET_V2: "false"/' {{ mint_data_dir }}/docker-compose.yml
      changed_when: true

    - name: Remove stale mint database to force keyset regeneration
      ansible.builtin.file:
        path: "{{ mint_data_dir }}/cdk-mintd.sqlite"
        state: absent
      when: false

    - name: Start mint with new mnemonic
      community.docker.docker_compose_v2:
        project_src: "{{ mint_data_dir }}"
        state: present
        pull: never

    - name: Wait for mint to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:3338/v1/info"
        method: GET
      register: mint_health
      retries: 15
      delay: 3
      until: mint_health.status == 200
      changed_when: false

    - name: Fetch new active keyset ID
      ansible.builtin.uri:
        url: "http://127.0.0.1:3338/v1/keysets"
        method: GET
        return_content: true
      register: keysets_resp
      changed_when: false

    - name: Set active keyset ID fact
      ansible.builtin.set_fact:
        mint_keyset_id: >-
          {{ keysets_resp.json.keysets | selectattr('active', 'equalto', true) | map(attribute='id') | first }}

    - name: Verify new keyset differs from old
      ansible.builtin.assert:
        that:
          - mint_keyset_id is defined
          - mint_keyset_id | length >= 4
          - (mint_keyset_id | regex_search('^00')) is not none
        fail_msg: >-
          Keyset ID '{{ mint_keyset_id | default("NONE") }}' is invalid.
          Ensure CDK_MINTD_USE_KEYSET_V2 is set to "false" in the mint
          docker-compose.yml so the Cashu JS client (cashu-ts v2.5+)
          can find the active keyset.
        quiet: true

    - name: Print keyset rotation summary
      ansible.builtin.debug:
        msg: >-
          Mint keyset rotated for election {{ election_id }}:
          keyset={{ mint_keyset_id }},
          backup={{ backup_dir.stdout }}

- name: Publish SEC-06 Election
  hosts: tollgate-vps
  become: true
  vars:
    coordinator_dir: "/opt/tollgate/coordinator"
    coordinator_venv: "{{ coordinator_dir }}/.venv"
    election_ttl_hours: 7

  tasks:
    - name: Wait for coordinator to be healthy
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/info"
        method: GET
      register: coord_info
      retries: 15
      delay: 3
      until: coord_info.status == 200
      changed_when: false

    - name: Compute election timestamps
      ansible.builtin.set_fact:
        election_start: "{{ ansible_date_time.epoch | int - 60 }}"
        election_end: "{{ ansible_date_time.epoch | int + (election_ttl_hours * 3600) }}"

    - name: Publish kind 38008 (election announcement)
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import asyncio, json, time
        from nostr_sdk import Keys, Kind, NostrSigner, Client, EventBuilder, Tag, RelayUrl

        async def main():
            nsec = "{{ coordinator_nsec }}"
            election_id = "{{ election_id }}"
            content = json.dumps({
                "title": "SEC-06 Feedback",
                "description": "Share your honest feedback on the SEC-06 cohort experience.",
                "questions": [
                    {
                        "id": "q1",
                        "type": "choice",
                        "prompt": "Would you say that you've enjoyed SEC-06 overall?",
                        "description": "Be honest.",
                        "options": ["Yes", "No"],
                        "select": "single"
                    },
                    {
                        "id": "q2",
                        "type": "choice",
                        "prompt": "Would you recommend SEC to a friend?",
                        "description": "A good friend, one that you actually like.",
                        "options": ["Yes", "No"],
                        "select": "single"
                    },
                    {
                        "id": "q3",
                        "type": "scale",
                        "prompt": "How would you rate SEC-06 overall?",
                        "description": "0 = dogshit, 5 = excellent",
                        "min": 0,
                        "max": 5,
                        "step": 1
                    },
                    {
                        "id": "q4",
                        "type": "text",
                        "prompt": "What is the one thing that was really bad?",
                        "description": "Like, the one thing that stuck out that annoyed you the most, that still annoys you weeks later."
                    },
                    {
                        "id": "q5",
                        "type": "text",
                        "prompt": "What could've been better?",
                        "description": "Leaving out the one worst thing from before, what could've been better in general? Feel free to be verbose."
                    },
                    {
                        "id": "q6",
                        "type": "text",
                        "prompt": "What essentials did you miss, if any?",
                        "description": "We don't consider foot massages to be essential"
                    },
                    {
                        "id": "q7",
                        "type": "text",
                        "prompt": "What's one small change that we could implement that would improve the cohort experience by a lot?"
                    },
                    {
                        "id": "q8",
                        "type": "text",
                        "prompt": "How many weeks would you prefer the cohort to be?",
                        "description": "Was it too long? Too short? Tell us what the perfect duration would be, and why!"
                    },
                    {
                        "id": "q9",
                        "type": "text",
                        "prompt": "Recommend at least one person for the next SEC.",
                        "description": "Not from the alumni list, we know them already. Please add their contact if possible."
                    },
                    {
                        "id": "q10",
                        "type": "text",
                        "prompt": "Any other comments and/or suggestions?",
                        "description": "Again: we are not looking for praise here, if you have something good to say please tell a friend or shout it into the void that is nostr."
                    }
                ],
                "vote_start": {{ election_start }},
                "vote_end": {{ election_end }},
                "confirm_end": {{ election_end + 3600 }},
                "mint_urls": ["http://{{ ansible_host }}:3338"],
                "keyset_id": "{{ mint_keyset_id }}"
            })

            keys = Keys.parse(nsec)
            coordinator_npub = keys.public_key().to_bech32()
            signer = NostrSigner.keys(keys)
            client = Client(signer)
            await client.add_relay(RelayUrl.parse("ws://localhost:10547"))
            await client.connect()
            await asyncio.sleep(1)
            tags = [
                Tag.parse(["t", "election-announcement"]),
                Tag.parse(["election", election_id]),
                Tag.parse(["coordinator", coordinator_npub]),
                Tag.parse(["mint", "http://{{ ansible_host }}:3338"]),
            ]
            builder = EventBuilder(kind=Kind(38008), content=content).tags(tags)
            result = await client.send_event_builder(builder)
            await asyncio.sleep(3)
            print(result.id.to_hex())

        asyncio.run(main())
        PYEOF
      args:
        executable: /bin/bash
      register: election_event
      changed_when: true

    - name: Wait for coordinator to cache election
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/election"
        method: GET
      register: election_check
      retries: 15
      delay: 3
      until: election_check.status == 200
      changed_when: false

    - name: Get effective election ID from coordinator
      ansible.builtin.set_fact:
        effective_election_id: >-
          {{ (election_check.json.election_id | default(election_id)) }}

    - name: Restart coordinator with --election-id
      ansible.builtin.include_role:
        name: deploy-coordinator
      vars:
        coordinator_election_id: "{{ effective_election_id }}"
      when: false

    - name: Update coordinator service with election ID
      ansible.builtin.shell: |
        sed -i '/ExecStart=/ s|--relays|--election-id {{ effective_election_id }} --relays|' /etc/systemd/system/tollgate-coordinator.service
        if ! grep -q 'election-id' /etc/systemd/system/tollgate-coordinator.service; then
          sed -i 's|--relays|--election-id {{ effective_election_id }} --relays|' /etc/systemd/system/tollgate-coordinator.service
        fi
      changed_when: true

    - name: Reload systemd and restart coordinator
      ansible.builtin.systemd_service:
        name: tollgate-coordinator
        state: restarted
        daemon_reload: true

    - name: Wait for coordinator to be healthy after restart
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/info"
        method: GET
      register: coord_recheck
      retries: 15
      delay: 3
      until: coord_recheck.status == 200
      changed_when: false

    - name: Verify election-id is set in coordinator service
      ansible.builtin.shell: grep -q '\-\-election-id' /etc/systemd/system/tollgate-coordinator.service
      register: election_id_check
      changed_when: false
      failed_when: election_id_check.rc != 0

    - name: Read eligible voters
      ansible.builtin.slurp:
        src: "{{ coordinator_dir }}/eligible-voters.json"
      register: voters_raw
      changed_when: false

    - name: Set eligible voters fact
      ansible.builtin.set_fact:
        eligible_npubs: "{{ voters_raw.content | b64decode | from_json }}"

    - name: Compute election timestamps
      ansible.builtin.set_fact:
        election_start: "{{ ansible_date_time.epoch | int - 60 }}"
        election_end: "{{ ansible_date_time.epoch | int + (election_ttl_hours * 3600) }}"

    - name: Compute eligibility root
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import hashlib, json
        npubs = {{ eligible_npubs | to_json }}
        root = hashlib.sha256(('\n'.join(sorted(npubs))).encode()).hexdigest()
        print(json.dumps({
            'eligible_count': len(npubs),
            'eligible_npubs': sorted(npubs),
            'eligible_root': root
        }))
        PYEOF
      args:
        executable: /bin/bash
      register: eligibility_content
      changed_when: false

    - name: Publish kind 38009 (eligibility set)
      ansible.builtin.shell: |
        {{ coordinator_venv }}/bin/python3 << 'PYEOF'
        import asyncio, json
        from nostr_sdk import Keys, Kind, NostrSigner, Client, EventBuilder, Tag, RelayUrl

        async def main():
            nsec = "{{ coordinator_nsec }}"
            eid = "{{ effective_election_id }}"
            content = '''{{ eligibility_content.stdout }}'''

            keys = Keys.parse(nsec)
            signer = NostrSigner.keys(keys)
            client = Client(signer)
            await client.add_relay(RelayUrl.parse("ws://localhost:10547"))
            await client.connect()
            await asyncio.sleep(1)
            tags = [Tag.parse(["election", eid])]
            builder = EventBuilder(kind=Kind(38009), content=content).tags(tags)
            result = await client.send_event_builder(builder)
            await asyncio.sleep(3)
            print(result.id.to_hex())

        asyncio.run(main())
        PYEOF
      args:
        executable: /bin/bash
      register: eligibility_event
      changed_when: true

    - name: Compute expiry datetime
      ansible.builtin.shell: date -u -d @{{ election_end }} '+%Y-%m-%d %H:%M:%S UTC'
      register: election_expiry_raw
      changed_when: false

    - name: Set expiry fact
      ansible.builtin.set_fact:
        election_expiry: "{{ election_expiry_raw.stdout }}"

    - name: Print voter instructions
      ansible.builtin.debug:
        msg: "{{ lookup('ansible.builtin.template', 'voter-instructions.j2') }}"
