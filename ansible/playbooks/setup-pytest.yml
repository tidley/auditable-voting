---
- name: Set up pytest environment
  hosts: localhost
  connection: local
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    test_requirements_path: "{{ repo_root }}/tests/requirements.txt"
    test_results_dir: "{{ repo_root }}/test-results"
    venv_dir: "{{ repo_root }}/.venv"

  tasks:
    - name: Check python3-venv is available
      ansible.builtin.command: python3 -m venv --help
      register: venv_available
      changed_when: false
      failed_when: false
      tags: [setup]

    - name: Check if virtual environment exists
      ansible.builtin.stat:
        path: "{{ venv_dir }}/bin/activate"
      register: venv_check
      tags: [setup]

    - name: Create virtual environment
      ansible.builtin.command:
        cmd: python3 -m venv "{{ venv_dir }}"
        creates: "{{ venv_dir }}/bin/activate"
      tags: [setup]

    - name: Install test requirements into venv
      ansible.builtin.pip:
        requirements: "{{ test_requirements_path }}"
        virtualenv: "{{ venv_dir }}"
      register: pip_result
      tags: [setup]

    - name: Install coordinator runtime dependencies into venv
      ansible.builtin.pip:
        requirements: "{{ repo_root }}/coordinator/proto/requirements.txt"
        virtualenv: "{{ venv_dir }}"
      tags: [setup]

    - name: Install nostr-sdk into venv
      ansible.builtin.pip:
        name: nostr-sdk
        virtualenv: "{{ venv_dir }}"
      tags: [setup]

    - name: Ensure test-results directory exists
      ansible.builtin.file:
        path: "{{ test_results_dir }}"
        state: directory
        mode: "0755"
      tags: [setup]

    - name: Run tests and persist results
      ansible.builtin.command:
        cmd: >
          {{ venv_dir }}/bin/python3
          {{ repo_root }}/scripts/run-tests.py
        chdir: "{{ repo_root }}"
      register: test_run
      changed_when: false
      tags: [run]

    - name: Show test results summary
      ansible.builtin.debug:
        msg: "{{ test_run.stdout_lines[-4:] }}"
      tags: [run]

    - name: Fail if any tests failed
      ansible.builtin.fail:
        msg: "Tests failed. Check output above."
      when: test_run.rc != 0
      tags: [run]
