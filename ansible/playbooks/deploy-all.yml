# =============================================================================
# Auditable Voting - Full Deployment
# =============================================================================
#
# Deploy everything (coordinator + voting client) in one command:
#
#   ansible-playbook ansible/playbooks/deploy-all.yml
#
# Deploy only the coordinator:
#
#   ansible-playbook ansible/playbooks/deploy-all.yml --tags coordinator
#
# Deploy only the voting client:
#
#   ansible-playbook ansible/playbooks/deploy-all.yml --tags client
#
# Run verification only (no deployment):
#
#   ansible-playbook ansible/playbooks/deploy-all.yml --tags verify
#
# =============================================================================

---
- name: Deploy Voting Coordinator
  ansible.builtin.import_playbook: deploy-coordinator.yml
  tags: [coordinator]

- name: Deploy Voting Client
  ansible.builtin.import_playbook: deploy-voting-client.yml
  tags: [client]

- name: Verify Deployed Infrastructure
  ansible.builtin.import_playbook: verify.yml
  tags: [verify]
