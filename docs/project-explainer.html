    <script id="source" type="text/plain"># Auditable Voting Explainer

Auditable Voting is a client-side voting app on public relay infrastructure for private credential issuance, anonymous response submission, and independent auditing.

The current repository contains only the browser app. It has voter, coordinator, and observer roles; private traffic uses NIP-17 DMs; public state is replayed from public relay events.

## Current Flow

### Coordinator

1. Build and publish a questionnaire definition (public event).
2. Invite voter npubs to that questionnaire.
3. Optional: in the separate **Build** page `Audit proxy` section, use Set up audit proxy to open the section and pre-generate an audit proxy account, then use the startup helper/downloads or save an autoconfigured platform launcher that already includes the current coordinator `npub`; right-click copy-link uses a shareable launcher URL that omits the audit proxy secret, generated launchers refresh the helper binary from GitHub Releases on each run, raw binary and direct CLI options sit under `Advanced`, and delegation still leaves the coordinator as root authority.
4. Receive blind-token requests over private DMs (or delegate handling to an audit proxy).
5. Issue blind signatures to authorised voters over private DMs (or let the audit proxy blind-sign on behalf of the coordinator for that delegated round). Invite payloads and cached election metadata now carry the audit proxy routing hint so voters can keep targeting the audit proxy if the coordinator browser goes offline, and audit proxy election-config DMs also carry the questionnaire definition so audit-proxy-issued blind credentials can still render the ballot if the coordinator browser is offline.
6. Watch public submissions and publish public accept/reject decisions (or delegate decision publication).
7. Close the round and publish the result summary (or enable audit proxy auto-summary once all invitees have accepted responses).

If the Build page reports that the blind-signing key is still initialising in the current tab, wait a moment and try publishing again; the app now attempts to recover the locally persisted blind-signing key before blocking publication.

## Audit Proxy

The audit proxy is an optional Rust helper for keeping delegated questionnaire work running when the coordinator browser is not open. It does not become the root authority for the questionnaire: the coordinator still creates the questionnaire, owns the coordinator identity, signs the delegation, and can revoke or replace the proxy.

The proxy receives two private control messages from the coordinator:

1. a signed worker delegation that names the questionnaire, proxy `npub`, capabilities, control relays, and expiry
2. an election config message containing the questionnaire metadata, blind-signing material needed for delegated issuance, and the routing hints voters should use

After activation, the proxy polls only its own NIP-17 mailbox over outbound relay connections. It can issue blind ballot credentials, publish submission decisions, verify public submissions, and publish result summaries when those capabilities are delegated. It sends heartbeats and operation reports back to the coordinator so the Build page can show whether the proxy is active.

For voters, the important distinction is who is expected to answer the blind request:

- without a proxy, `Waiting for coordinator` means the coordinator browser must come online and process the request
- with a proxy, `Waiting for audit proxy` means the delegated helper should issue the credential, even if the coordinator browser has gone offline

Invite payloads and cached questionnaire metadata include the proxy routing hint, so voters keep targeting the proxy after reloads. The helper currently defaults to `relay.nostr.net` and `nos.lol`, and sanitises older persisted relay lists back to that pair before polling so it avoids known unreliable or deprecated endpoints.

### Voter

1. Open an invite or log in as **Voter**.
2. Open the questionnaire.
3. Request a blind ballot credential (auto when invite context exists, or use `Request ballot`).
4. Wait for `Credential ready: Yes`.
5. Fill in the response fields.
6. Submit publicly with an ephemeral response npub and blind-token proof.
7. Wait for the coordinator’s public submission decision.

Drafted response fields stay intact when the credential or refreshed definition arrives for the same questionnaire.

### Observer

1. Open **Observer**.
2. Read public submissions and public submission decisions.
3. Verify accepted/rejected outcomes and per-question totals.
4. Compare live accepted responses with the public expected-response count when the questionnaire definition includes one.
5. Use **Submitted Votes** for per-response detail (search/filter), and enable `Show invalid votes` when you need rejected-row diagnostics.

## Privacy Model

The questionnaire path now uses a real blind-signing shape:

1. The coordinator has a questionnaire blind-signing key.
2. The voter creates a local token secret and commitment.
3. The voter blinds the token message with RSABSSA.
4. The coordinator signs only the blinded message.
5. The voter unblinds the signature locally.
6. The voter submits using a fresh ephemeral response npub.
7. The coordinator verifies the unblinded credential and accepts the first spend for the token nullifier.

The submitted response no longer uses the invited voter npub as the ballot identity.

```mermaid
sequenceDiagram
  participant V as Voter identity
  participant E as Ephemeral response key
  participant C as Coordinator
  participant A as Observer

  V->>C: Blinded credential request
  C->>V: Blind signature
  V->>V: Unblind credential locally
  E->>C: Submit response + token proof
  C->>C: Verify credential and nullifier
  C->>A: Publish/update summary
```

## What Is Public

- questionnaire definitions
- questionnaire state changes
- public questionnaire submissions
- public coordinator submission decisions (accept/reject)
- published result summaries
- observer-discovered public questionnaire metadata
- expected invitee count for newly published questionnaire definitions, so observers can see turnout/completion without private invite contents

## What Stays Private Or Local

- voter login keys
- coordinator signing keys
- voter token secrets and blinding factors
- unspent credentials
- private response payloads
- local recovery state

## Architecture

```mermaid
flowchart LR
  V[Voter Browser]
  C[Coordinator Browser]
  A[Observer Browser]
  N[Nostr Relays]
  L[(Local Browser State)]

  V <--> N
  C <--> N
  A <--> N
  V --> L
  C --> L
```

The client uses:

- React and TypeScript for the browser UI
- `nostr-tools` for Nostr identities, events, relay reads, and relay writes
- NIP-17 gift-wrapped DMs for private request and issuance traffic
- `@cloudflare/blindrsa-ts` for RSABSSA blind signatures
- Rust/Wasm for deterministic replay and protocol validation in the public round path
- an optional Rust audit proxy runtime (`worker/`) for delegated election operations over outbound-only relay connections
- seven-day fixed-lookback audit proxy DM polling with event-id dedupe so relay-randomised gift-wrap timestamps do not cause missed delegated blind requests, plus status heartbeats back to the coordinator, active delegation control-relay reads, and a tight helper relay set of `relay.nostr.net` and `nos.lol`; persisted legacy relay lists are sanitised back to that pair before polling
- browser storage for private active state and recovery

## Blind Issuance

```mermaid
flowchart LR
  M[Token Message]
  B[Blinding]
  R[Blinded Request]
  S[Coordinator Blind-Signs]
  U[Unblinding]
  T[Spendable Credential]

  M --> B --> R --> S --> U --> T
```

The coordinator signs a blinded token message. The voter finalises the credential locally and spends it through an ephemeral response key.

## Duplicate Spend Rule

```mermaid
flowchart TD
  A[Spend A with Token X]
  B[Spend B with Token X]
  O[Canonical Ordering]
  K[Keep First Valid Spend]
  D[Reject Duplicate]

  A --> O
  B --> O
  O --> K
  O --> D
```

The current rule is first valid spend wins. The questionnaire path rejects duplicate nullifiers and duplicate accepted spends for the same token commitment.

## Auditability

```mermaid
flowchart LR
  E[Nostr Events]
  V[Validate]
  D[Deduplicate]
  T[Compute Summary]
  R[Independent Result]

  E --> V --> D --> T --> R
```

Observers derive results from public submissions and public coordinator decisions.
The published summary includes per-response references as a parity backfill, so the observer can still render full responder rows even when relay visibility is fragmented.

Before a final result summary exists, the observer derives a live provisional summary from verified public submissions and labels it as live relay-derived data. Newly published questionnaire definitions also carry an expected invitee count, letting the observer show accepted responses against the expected participant total while keeping individual invitees private.

The observer view keeps normal refreshes bounded to recent questionnaires to avoid relay pressure. Use `Search historic data` next to the questionnaire selector to explicitly scan a wider historical window when an older published questionnaire or result payload is missing from the default list.

## Current Limits

- Public relays can delay, drop, or rate-limit traffic.
- Coordinator private keys and blind-signing keys are browser-local.
- The questionnaire path is currently single-coordinator.
- Larger multi-coordinator live runs are still operationally fragile on public relays.
- Observer detail is near real-time (poll-based), but exact freshness depends on relay propagation and indexing.
- If a response payload is encrypted/private, the observer can still show metadata/decision status but not plaintext answers; coordinator-side results can decrypt `enc:nip44v2:` text when the key is present locally.

## Short Summary

> Private eligibility, blind credential issuance, ephemeral response submission, public audit.
</script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      const source = document.getElementById("source").textContent;
      const content = document.getElementById("content");
      const tocList = document.getElementById("toc-list");
      const modal = document.getElementById("diagram-modal");
      const modalPanel = document.getElementById("diagram-modal-panel");

      marked.setOptions({ gfm: true, breaks: false });
      content.innerHTML = marked.parse(source);

      const usedHeadingIds = new Set();
      const slugify = (value) => value.toLowerCase().trim().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-").replace(/-+/g, "-");

      for (const heading of content.querySelectorAll("h2, h3")) {
        const text = heading.textContent?.trim() ?? "";
        if (!text) continue;
        const baseId = slugify(text) || "section";
        let nextId = baseId;
        let dedupe = 2;
        while (usedHeadingIds.has(nextId) || document.getElementById(nextId)) {
          nextId = `${baseId}-${dedupe}`;
          dedupe += 1;
        }
        usedHeadingIds.add(nextId);
        heading.id = nextId;

        const item = document.createElement("li");
        item.className = `toc-level-${heading.tagName.toLowerCase()}`;
        const link = document.createElement("a");
        link.href = `#${nextId}`;
        link.textContent = text;
        item.appendChild(link);
        tocList.appendChild(item);
      }

      for (const block of content.querySelectorAll("pre code.language-mermaid")) {
        const wrapper = document.createElement("button");
        wrapper.type = "button";
        wrapper.className = "mermaid-wrap";
        wrapper.setAttribute("aria-label", "Enlarge diagram");

        const diagram = document.createElement("div");
        diagram.className = "mermaid";
        diagram.textContent = block.textContent;
        wrapper.appendChild(diagram);

        const pre = block.closest("pre");
        pre.replaceWith(wrapper);
      }

      mermaid.initialize({ startOnLoad: false, theme: "dark", securityLevel: "loose" });
      await mermaid.run({ querySelector: ".mermaid" });

      for (const wrapper of content.querySelectorAll(".mermaid-wrap")) {
        wrapper.addEventListener("click", () => {
          modalPanel.innerHTML = wrapper.innerHTML;
          modal.classList.add("is-open");
        });
      }

      const closeModal = () => {
        modal.classList.remove("is-open");
        modalPanel.innerHTML = "";
      };
      modal.addEventListener("click", closeModal);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });
    </script>
