name: Build Worker Release Assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to upload assets to (for example v0.1.11)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-worker-assets:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_name: auditable-voting-worker-linux-x64.tar.gz
            package_type: tar
            binary_name: auditable-voting-worker
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            asset_name: auditable-voting-worker-linux-arm64.tar.gz
            package_type: tar
            binary_name: auditable-voting-worker
          - os: ubuntu-latest
            target: armv7-unknown-linux-gnueabihf
            asset_name: auditable-voting-worker-linux-armv7.tar.gz
            package_type: tar
            binary_name: auditable-voting-worker
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_name: auditable-voting-worker-windows-x64.zip
            package_type: zip
            binary_name: auditable-voting-worker.exe
          - os: macos-13
            target: x86_64-apple-darwin
            asset_name: auditable-voting-worker-macos-x64.tar.gz
            package_type: tar
            binary_name: auditable-voting-worker
          - os: macos-14
            target: aarch64-apple-darwin
            asset_name: auditable-voting-worker-macos-arm64.tar.gz
            package_type: tar
            binary_name: auditable-voting-worker
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux cross toolchains
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-arm-linux-gnueabihf

      - name: Build worker
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"
        working-directory: worker
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER: arm-linux-gnueabihf-gcc

      - name: Package tarball asset
        if: matrix.package_type == 'tar'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          cp "worker/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" release/
          cp worker/README.md release/README.txt
          tar -C release -czf "${{ matrix.asset_name }}" .

      - name: Package zip asset
        if: matrix.package_type == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item "worker/target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "release/${{ matrix.binary_name }}"
          Copy-Item "worker/README.md" "release/README.txt"
          Compress-Archive -Path "release/*" -DestinationPath "${{ matrix.asset_name }}" -Force

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: worker-asset-${{ matrix.target }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  upload-release-assets:
    runs-on: ubuntu-latest
    needs: build-worker-assets
    env:
      TAG_NAME: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag }}
    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          set -euo pipefail
          mkdir -p release-assets
          find artifacts -type f -maxdepth 3 -exec cp {} release-assets/ \;
          ls -la release-assets

      - name: Generate checksums
        run: |
          set -euo pipefail
          cd release-assets
          for f in *; do
            sha256sum "$f" > "$f.sha256"
          done
          ls -la

      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAG_NAME:-}" ]; then
            echo "Tag name is empty."
            exit 1
          fi
          gh release upload "${TAG_NAME}" release-assets/* --clobber
