    <script id="source" type="text/plain"># Auditable Voting Explainer

Auditable Voting is a client-side Nostr app for private credential issuance, anonymous response submission, and independent auditing.

The current repository contains only the browser app. It has voter, coordinator, and auditor roles; private traffic uses NIP-17 DMs; public state is replayed from Nostr where possible.

## Current Flow

### Coordinator

1. Build the questionnaire.
2. Add eligible voter npubs.
3. Send invites or share invite links.
4. Process blind ballot requests.
5. Process submitted responses.
6. Close the questionnaire and publish results.

### Voter

1. Open an invite or log in as **Voter**.
2. Open the questionnaire.
3. The app requests a blind ballot credential automatically when invite context and login are present (or use `Request ballot` manually).
4. Wait for `Credential ready: Yes`.
5. Fill in the response fields.
6. Submit the response (the button shows `Waiting for coordinator...` until submission is available).
7. Private request, issuance, and submission steps now send explicit acknowledgements, so retries can back off once the next phase has definitely received the message.

Invite links can point to a public questionnaire id. Signer login opens the Vote tab directly, completes voter login, and loads the public questionnaire definition, including the blind-signing public key, without scanning old encrypted invite DMs. Manual invite checks and credential-result polling use recent bounded signer DM reads.

On Android, signer sessions prefer Amber through NIP-46 when available so `get_public_key`, `sign_event`, `nip04`, and `nip44` operations stay on one signer identity, and the app now requests the full permission set up front during connect.

The login gateway now orders controls as `Signer`/`nsec`, then signer choice (`NOS2X-FOX`/`Amber`), then one login action button. It can also generate Nostr Connect links directly, show a QR code for the `nostrconnect://` URL, and copy both `nostrconnect://` and Amber-compatible `bunker://` (`nsecbunker`) variants.

Blind request, issuance, submission, and acceptance DMs now also resolve recipient NIP-17 relay-list hints (`kind:10050`) before static fallbacks, keep curated fallback relay redundancy, and only count a DM publish as delivered when at least one relay actually accepts it.

Private questionnaire recovery now uses shared websocket inbox subscriptions, sticky successful relay subsets per questionnaire, and bounded refreshes on focus/visibility/online instead of relying only on repeated timer-driven resend loops.

Invite-link clipboard writes are best-effort, so browser focus restrictions do not throw unhandled errors after async relay work.

The voter page labels the questionnaire voting identity separately from the signer account and shows request, credential, and response state. The `Vote` tab remains available so voters can browse current and older invited questionnaires; unavailable actions show waiting states until questionnaire context is ready. Silent invite polling does not force tab switches away from Configure/Settings. Resending a blind-ballot request keeps the same request id; the coordinator republishes the existing credential DM rather than issuing a second credential. Blind-request and ballot-submission sends only move to "sent" after confirmed relay acceptance. Credential delivery now mixes recipient relay hints with fallback relays, publishes to more relays, retries issued credentials until submission proves receipt, and uses wider bounded signer DM scans for recovery. On first login/open, the Vote flow auto-sends the blind-ballot request when invite context exists, and `Submit response` remains `Waiting for coordinator...` until the credential and response prerequisites are satisfied.

The private questionnaire phases now also send explicit blind-request, credential-receipt, and submission-receipt acknowledgements. That lets the coordinator and voter stop unnecessary resends once delivery is confirmed instead of inferring success only from later state.

When a response is submitted with the ephemeral response key, the app also sends a best-effort encrypted self-copy of the submission back to the voter's login identity. This lets a voter log in later, select the questionnaire from the Vote tab, and recover the submitted response marker and answers from their own NIP-17 mailbox even if browser-local state was lost.

Drafted response fields stay intact when the credential or refreshed definition arrives for the same questionnaire.

### Auditor

1. Open **Auditor**.
2. Review discovered rounds and recent public questionnaires.
3. Filter by coordinator, questionnaire ID, round ID, prompt, or npub.
4. Compare public state, accepted counts, rejected counts, and published summaries.

## Privacy Model

The questionnaire path now uses a real blind-signing shape:

1. The coordinator has a questionnaire blind-signing key.
2. The voter creates a local token secret and commitment.
3. The voter blinds the token message with RSABSSA.
4. The coordinator signs only the blinded message.
5. The voter unblinds the signature locally.
6. The voter submits using a fresh ephemeral response npub.
7. The coordinator verifies the unblinded credential and accepts the first spend for the token nullifier.

The submitted response no longer uses the invited voter npub as the ballot identity.

```mermaid
sequenceDiagram
  participant V as Voter identity
  participant E as Ephemeral response key
  participant C as Coordinator
  participant A as Auditor

  V->>C: Blinded credential request
  C->>V: Blind signature
  V->>V: Unblind credential locally
  E->>C: Submit response + token proof
  C->>C: Verify credential and nullifier
  C->>A: Publish/update summary
```

## What Is Public

- questionnaire definitions
- questionnaire state changes
- public rounds and ballots in the simple voting path
- published result summaries
- auditor-discovered public questionnaire metadata

## What Stays Private Or Local

- voter login keys
- coordinator signing keys
- voter token secrets and blinding factors
- unspent credentials
- private response payloads
- local recovery state

## Architecture

```mermaid
flowchart LR
  V[Voter Browser]
  C[Coordinator Browser]
  A[Auditor Browser]
  N[Nostr Relays]
  L[(Local Browser State)]

  V <--> N
  C <--> N
  A <--> N
  V --> L
  C --> L
```

The client uses:

- React and TypeScript for the browser UI
- `nostr-tools` for Nostr identities, events, relay reads, and relay writes
- NIP-17 gift-wrapped DMs for private request, issuance, submission, and acceptance traffic
- `@cloudflare/blindrsa-ts` for RSABSSA blind signatures
- Rust/Wasm for deterministic replay and protocol validation in the public round path
- browser storage for private active state and recovery

## Blind Issuance

```mermaid
flowchart LR
  M[Token Message]
  B[Blinding]
  R[Blinded Request]
  S[Coordinator Blind-Signs]
  U[Unblinding]
  T[Spendable Credential]

  M --> B --> R --> S --> U --> T
```

The coordinator signs a blinded token message. The voter finalises the credential locally and spends it through an ephemeral response key.

## Duplicate Spend Rule

```mermaid
flowchart TD
  A[Spend A with Token X]
  B[Spend B with Token X]
  O[Canonical Ordering]
  K[Keep First Valid Spend]
  D[Reject Duplicate]

  A --> O
  B --> O
  O --> K
  O --> D
```

The current rule is first valid spend wins. The questionnaire flow rejects duplicate nullifiers and duplicate accepted spends for the same token commitment.

## Auditability

```mermaid
flowchart LR
  E[Nostr Events]
  V[Validate]
  D[Deduplicate]
  T[Compute Summary]
  R[Independent Result]

  E --> V --> D --> T --> R
```

Auditors can inspect recent public questionnaires, public round data, and published result summaries. When the coordinator closes and publishes a questionnaire, it also attempts to publish accepted response payload events, including free-text answers, so auditors can inspect full results where those public payload events were accepted by relays. Private and free-text answer payloads remain unavailable to public auditors if only the aggregate summary was published or if the per-response payload events were not discoverable.

The auditor view keeps normal refreshes bounded to recent questionnaires to avoid relay pressure. Use `Search historic data` next to the questionnaire selector to explicitly scan a wider historical window when an older published questionnaire or result payload is missing from the default list.

## Current Limits

- Public relays can delay, drop, or rate-limit traffic.
- Coordinator private keys and blind-signing keys are browser-local.
- The questionnaire path is currently single-coordinator.
- Larger multi-coordinator live runs are still operationally fragile on public relays.
- Published summaries are auditable against visible public state, but encrypted/private answer contents require coordinator-side processing.

## Short Summary

> Private eligibility, blind credential issuance, ephemeral response submission, public audit.
</script>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
      import mermaid from "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs";

      const source = document.getElementById("source").textContent;
      const content = document.getElementById("content");
      const tocList = document.getElementById("toc-list");
      const modal = document.getElementById("diagram-modal");
      const modalPanel = document.getElementById("diagram-modal-panel");

      marked.setOptions({ gfm: true, breaks: false });
      content.innerHTML = marked.parse(source);

      const usedHeadingIds = new Set();
      const slugify = (value) => value.toLowerCase().trim().replace(/[^a-z0-9\s-]/g, "").replace(/\s+/g, "-").replace(/-+/g, "-");

      for (const heading of content.querySelectorAll("h2, h3")) {
        const text = heading.textContent?.trim() ?? "";
        if (!text) continue;
        const baseId = slugify(text) || "section";
        let nextId = baseId;
        let dedupe = 2;
        while (usedHeadingIds.has(nextId) || document.getElementById(nextId)) {
          nextId = `${baseId}-${dedupe}`;
          dedupe += 1;
        }
        usedHeadingIds.add(nextId);
        heading.id = nextId;

        const item = document.createElement("li");
        item.className = `toc-level-${heading.tagName.toLowerCase()}`;
        const link = document.createElement("a");
        link.href = `#${nextId}`;
        link.textContent = text;
        item.appendChild(link);
        tocList.appendChild(item);
      }

      for (const block of content.querySelectorAll("pre code.language-mermaid")) {
        const wrapper = document.createElement("button");
        wrapper.type = "button";
        wrapper.className = "mermaid-wrap";
        wrapper.setAttribute("aria-label", "Enlarge diagram");

        const diagram = document.createElement("div");
        diagram.className = "mermaid";
        diagram.textContent = block.textContent;
        wrapper.appendChild(diagram);

        const pre = block.closest("pre");
        pre.replaceWith(wrapper);
      }

      mermaid.initialize({ startOnLoad: false, theme: "dark", securityLevel: "loose" });
      await mermaid.run({ querySelector: ".mermaid" });

      for (const wrapper of content.querySelectorAll(".mermaid-wrap")) {
        wrapper.addEventListener("click", () => {
          modalPanel.innerHTML = wrapper.innerHTML;
          modal.classList.add("is-open");
        });
      }

      const closeModal = () => {
        modal.classList.remove("is-open");
        modalPanel.innerHTML = "";
      };
      modal.addEventListener("click", closeModal);
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") closeModal();
      });
    </script>
